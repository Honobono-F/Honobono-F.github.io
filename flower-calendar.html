<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花の開花時期カレンダー | Honobono</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#faf8f2;
  --bg2:#f3f0e6;
  --white:#ffffff;
  --ink:#1e1a14;
  --ink2:#5a5040;
  --ink3:#9a8a78;
  --gold:#b8934a;
  --gold2:#d4ae72;
  --gold3:#f0d9a8;
  --border:rgba(184,147,74,0.18);
  --spring:#e8607a;
  --spring-bg:#fff0f4;
  --summer:#2a9a60;
  --summer-bg:#f0faf4;
  --autumn:#c86820;
  --autumn-bg:#fff8f0;
  --winter:#4870c8;
  --winter-bg:#f0f4ff;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-weight:300;
  line-height:1.7;
}

/* Header */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(250,248,242,0.94);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 40px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'Shippori Mincho',serif;font-size:1rem;color:var(--gold);text-decoration:none;letter-spacing:0.1em;}
.header-title{font-family:'Shippori Mincho',serif;font-size:0.85rem;letter-spacing:0.3em;color:var(--ink2);}
.current-month{
  font-size:11px;letter-spacing:0.2em;color:var(--gold);
  border:1px solid var(--gold3);padding:4px 14px;border-radius:20px;
  background:rgba(240,217,168,0.2);
}

/* Hero */
.hero{
  padding:60px 40px 48px;text-align:center;
  background:linear-gradient(180deg,rgba(240,217,168,0.12) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
}
.hero-label{display:inline-block;font-size:10px;letter-spacing:0.5em;color:var(--gold);border:1px solid var(--gold3);padding:4px 20px;border-radius:20px;margin-bottom:20px;background:rgba(240,217,168,0.15);}
.hero h1{font-family:'Shippori Mincho',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:600;color:var(--ink);letter-spacing:0.06em;margin-bottom:12px;}
.hero p{font-size:13px;color:var(--ink2);max-width:440px;margin:0 auto 28px;letter-spacing:0.05em;}

/* Season legend */
.season-legend{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:0.1em;color:var(--ink2);}
.legend-dot{width:10px;height:10px;border-radius:50%;}

/* Month navigation */
.month-nav{
  display:grid;grid-template-columns:repeat(12,1fr);
  gap:2px;padding:20px 40px 0;
  position:sticky;top:57px;z-index:90;
  background:rgba(250,248,242,0.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding-bottom:12px;
}
.month-btn{
  padding:6px 2px;
  border:none;background:none;
  font-size:11px;font-family:'Zen Kaku Gothic New',sans-serif;
  color:var(--ink3);cursor:pointer;
  border-radius:6px;
  transition:all 0.2s;
  letter-spacing:0.05em;
}
.month-btn:hover{background:var(--gold3);color:var(--gold);}
.month-btn.current{background:var(--gold);color:white;font-weight:500;}

/* Main calendar grid */
.calendar{padding:40px;}
.year-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

/* Month card */
.month-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  transition:transform 0.3s,box-shadow 0.3s;
  animation:fadeUp 0.5s ease both;
}
.month-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(184,147,74,0.12);}
.month-card.current-card{border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,147,74,0.2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.month-header{
  padding:14px 18px 10px;
  display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.month-num{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:2rem;
  line-height:1;
}
.month-name{font-family:'Shippori Mincho',serif;font-size:0.75rem;letter-spacing:0.2em;color:var(--ink2);}
.month-season{font-size:9px;letter-spacing:0.3em;padding:2px 8px;border-radius:10px;}

/* Flower items in month */
.flower-list{padding:10px 14px 14px;}
.flower-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;
  border-bottom:1px solid rgba(184,147,74,0.08);
  cursor:pointer;
  transition:background 0.2s;
  border-radius:6px;
  padding:8px 6px;
  margin:0 -6px;
}
.flower-item:last-child{border-bottom:none;}
.flower-item:hover{background:rgba(240,217,168,0.2);}
.flower-mini-svg{width:40px;height:40px;flex-shrink:0;}
.flower-mini-svg svg{width:100%;height:100%;}
.flower-item-info{flex:1;min-width:0;}
.flower-item-name{font-family:'Shippori Mincho',serif;font-size:0.9rem;font-weight:500;color:var(--ink);margin-bottom:2px;}
.flower-item-meaning{font-size:10px;color:var(--ink3);letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.flower-item-period{font-size:9px;color:var(--gold);letter-spacing:0.1em;margin-top:2px;}

/* Detail modal */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(30,26,20,0.55);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--bg);
  border-radius:24px;
  max-width:520px;width:100%;
  max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.18);
  transform:scale(0.96) translateY(16px);
  transition:transform 0.3s;
  position:relative;
}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;background:white;
  border:1px solid var(--border);border-radius:50%;
  cursor:pointer;font-size:16px;color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;z-index:10;
}
.modal-close:hover{background:var(--spring);color:white;border-color:var(--spring);}
.modal-illust{
  height:220px;display:flex;align-items:center;justify-content:center;
  border-radius:24px 24px 0 0;
}
.modal-illust svg{width:160px;height:160px;}
.modal-body{padding:24px 28px 28px;}
.modal-season{font-size:10px;letter-spacing:0.4em;color:var(--gold);margin-bottom:6px;}
.modal-name-jp{font-family:'Shippori Mincho',serif;font-size:1.8rem;font-weight:600;color:var(--ink);margin-bottom:2px;}
.modal-name-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--ink3);margin-bottom:20px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.modal-item{background:white;border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.modal-item-label{font-size:9px;letter-spacing:0.3em;color:var(--gold);margin-bottom:3px;}
.modal-item-value{font-size:13px;color:var(--ink);}
.modal-meaning{
  background:linear-gradient(135deg,rgba(184,147,74,0.08),rgba(232,96,122,0.05));
  border:1px solid var(--gold3);border-radius:12px;
  padding:14px 18px;margin-bottom:16px;
}
.modal-meaning-label{font-size:9px;letter-spacing:0.3em;color:var(--spring);margin-bottom:6px;}
.modal-meaning-text{font-family:'Shippori Mincho',serif;font-size:0.95rem;color:var(--ink);line-height:1.8;}
.modal-desc{font-size:13px;color:var(--ink2);line-height:1.9;border-top:1px solid var(--border);padding-top:16px;}

/* Scroll to month button */
.scroll-top{
  position:fixed;bottom:24px;right:24px;z-index:50;
  width:44px;height:44px;
  background:var(--gold);color:white;
  border:none;border-radius:50%;
  font-size:18px;cursor:pointer;
  box-shadow:0 4px 16px rgba(184,147,74,0.3);
  transition:all 0.3s;
  display:flex;align-items:center;justify-content:center;
}
.scroll-top:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(184,147,74,0.4);}

footer{text-align:center;padding:32px;border-top:1px solid var(--border);font-size:11px;color:var(--ink3);letter-spacing:0.2em;}
footer a{color:var(--gold);text-decoration:none;}

@media(max-width:900px){.year-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){
  .year-grid{grid-template-columns:repeat(2,1fr);}
  .month-nav{grid-template-columns:repeat(6,1fr);}
  header{padding:12px 20px;}
  .hero{padding:40px 20px 32px;}
  .calendar{padding:20px;}
  .modal-grid{grid-template-columns:1fr;}
}
@media(max-width:400px){.year-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Honobono</a>
  <span class="header-title">開花時期カレンダー</span>
  <span class="current-month" id="currentMonthBadge"></span>
</header>

<section class="hero">
  <div class="hero-label">FLOWER CALENDAR 2026</div>
  <h1>花の開花時期カレンダー</h1>
  <p>日本の四季を彩る花たちが、どの季節に咲くのかを一覧で。花をクリックすると詳しい情報が見られます。</p>
  <div class="season-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e8607a"></div>春（3〜5月）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a9a60"></div>夏（6〜8月）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c86820"></div>秋（9〜11月）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4870c8"></div>冬（12〜2月）</div>
  </div>
</section>

<nav class="month-nav" id="monthNav"></nav>

<main class="calendar">
  <div class="year-grid" id="yearGrid"></div>
</main>

<button class="scroll-top" onclick="scrollToTop()" title="トップへ">↑</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">×</button>
    <div class="modal-illust" id="modalIllust"></div>
    <div class="modal-body">
      <div class="modal-season" id="modalSeason"></div>
      <div class="modal-name-jp" id="modalNameJp"></div>
      <div class="modal-name-en" id="modalNameEn"></div>
      <div class="modal-grid">
        <div class="modal-item"><div class="modal-item-label">開花時期</div><div class="modal-item-value" id="modalBloom"></div></div>
        <div class="modal-item"><div class="modal-item-label">原産地</div><div class="modal-item-value" id="modalOrigin"></div></div>
        <div class="modal-item"><div class="modal-item-label">色</div><div class="modal-item-value" id="modalColor"></div></div>
        <div class="modal-item"><div class="modal-item-label">科・属</div><div class="modal-item-value" id="modalFamily"></div></div>
      </div>
      <div class="modal-meaning">
        <div class="modal-meaning-label">花言葉</div>
        <div class="modal-meaning-text" id="modalMeaning"></div>
      </div>
      <div class="modal-desc" id="modalDesc"></div>
    </div>
  </div>
</div>

<footer><p><a href="index.html">← Honobono トップへ</a>　｜　花の開花時期カレンダー © 2026</p></footer>

const currentMonth = new Date().getMonth()+1;

// Render month nav
document.getElementById('monthNav').innerHTML = months.map(m=>`
  <button class="month-btn${m.num===currentMonth?' current':''}" onclick="scrollToMonth(${m.num})">${m.num}月</button>
`).join('');

document.getElementById('currentMonthBadge').textContent = currentMonth+'月';

// Render year grid
document.getElementById('yearGrid').innerHTML = months.map((m,mi)=>{
  const s = seasons[m.season];
  const monthFlowers = flowers.filter(f=>f.months.includes(m.num))
    .sort((a,b)=>a.peakMonth-b.peakMonth);
  return `
    <div class="month-card${m.num===currentMonth?' current-card':''}" id="month-${m.num}" style="animation-delay:${mi*0.05}s">
      <div class="month-header">
        <div>
          <span class="month-num" style="color:${s.color}">${m.num}</span>
          <span style="font-size:0.7rem;color:var(--ink3);margin-left:4px;">月</span>
        </div>
        <div style="text-align:right">
          <div class="month-name" style="color:var(--ink2)">${m.name}</div>
          <span class="month-season" style="background:${s.bg};color:${s.color}">${s.label}</span>
        </div>
      </div>
      <div class="flower-list">
        ${monthFlowers.length===0
          ? '<div style="font-size:11px;color:var(--ink3);padding:12px 6px;text-align:center;">休眠期</div>'
          : monthFlowers.map(f=>`
          <div class="flower-item" onclick="openModal(${f.id})">
            <div class="flower-mini-svg">${f.svg}</div>
            <div class="flower-item-info">
              <div class="flower-item-name">${f.nameJp}</div>
              <div class="flower-item-meaning">${f.meaning.split('。')[0]}</div>
              <div class="flower-item-period">${f.bloom}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}).join('');

function scrollToMonth(num){
  document.getElementById('month-'+num)?.scrollIntoView({behavior:'smooth',block:'center'});
}

function openModal(id){
  const f=flowers.find(x=>x.id===id);
  if(!f)return;
  const s=seasons[f.season];
  document.getElementById('modalIllust').style.background=f.bg;
  document.getElementById('modalIllust').innerHTML=`<svg viewBox="0 0 80 80" width="160" height="160">${f.svg.match(/<svg[^>]*>([\s\S]*)<\/svg>/)[1]}</svg>`;
  document.getElementById('modalSeason').textContent=s.label+'の花';
  document.getElementById('modalNameJp').textContent=f.nameJp;
  document.getElementById('modalNameEn').textContent=f.nameEn;
  document.getElementById('modalBloom').textContent=f.bloom;
  document.getElementById('modalOrigin').textContent=f.origin;
  document.getElementById('modalColor').textContent=f.color;
  document.getElementById('modalFamily').textContent=f.family;
  document.getElementById('modalMeaning').textContent=f.meaning;
  document.getElementById('modalDesc').textContent=f.desc;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalBtn();});
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'});}

// Auto scroll to current month
setTimeout(()=>scrollToMonth(currentMonth),600);
