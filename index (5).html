<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honobono</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sakura-deep: #c4607a;
  --sakura-mid:  #e8a0b4;
  --sakura-pale: #f7dde6;
  --gold:        #c9a96e;
  --gold-light:  #e8d5b0;
  --brown:       #6a3a18;
  --brown-dark:  #3e1f08;
  --ink:         #2a1a1f;
  --white:       #fffbfc;
  --glow-white:  rgba(255,255,255,1);
  --glow-soft:   rgba(255,245,248,0.95);
}

html, body { width:100%; height:100%; overflow:hidden; }
body { font-family:'Noto Serif JP', serif; cursor:none; }

/* ── カスタムカーソル ── */
.cursor {
  position:fixed; width:8px; height:8px;
  background:var(--sakura-deep); border-radius:50%;
  pointer-events:none; z-index:200;
  transform:translate(-50%,-50%);
  transition:transform .1s ease;
}
.cursor-ring {
  position:fixed; width:34px; height:34px;
  border:1px solid rgba(232,160,180,0.7); border-radius:50%;
  pointer-events:none; z-index:200;
  transform:translate(-50%,-50%);
  transition:all .15s ease;
}

/* ── 背景画像 ── */
.bg-image {
  position:fixed; inset:0; z-index:0;
  background-image:url('images/GitHub-sakura/sakura-main.png');
  background-size:cover; background-position:center;
}

/* ── 全面グラデーションオーバーレイ ── */
/* 上部・下部を少し締めて中央の写真を活かす */
.bg-overlay {
  position:fixed; inset:0; z-index:1;
  background:
    linear-gradient(
      to bottom,
      rgba(20,8,12,0.38) 0%,
      rgba(20,8,12,0.10) 28%,
      rgba(20,8,12,0.08) 55%,
      rgba(20,8,12,0.30) 82%,
      rgba(20,8,12,0.48) 100%
    );
}

/* ── 花びら canvas ── */
#sakura-canvas {
  position:fixed; inset:0;
  width:100%; height:100%;
  pointer-events:none; z-index:2;
}

/* ── 縦書き装飾 ── */
.v-text {
  position:fixed; writing-mode:vertical-rl;
  font-size:9px; letter-spacing:.45em;
  font-family:'Noto Serif JP', serif; font-weight:200;
  z-index:10;
  color:rgba(255,235,240,0.55);
  text-shadow:0 0 10px rgba(255,255,255,0.4);
}
.v-text.left  { left:18px;  top:50%; transform:translateY(-50%); }
.v-text.right { right:18px; top:50%; transform:translateY(-50%); }

/* ── メインコンテナ ── */
.container {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px 24px;
  gap:0;
}

/* ── SPRING 2026 ライン ── */
.deco-top {
  display:flex; align-items:center; gap:14px;
  margin-bottom:18px;
  opacity:0; animation:fadeIn 1.5s ease .4s forwards;
}
.deco-line {
  width:56px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,210,220,0.85));
}
.deco-line.right {
  background:linear-gradient(90deg, rgba(255,210,220,0.85), transparent);
}
.deco-diamond {
  width:5px; height:5px;
  background:rgba(255,210,220,0.9); transform:rotate(45deg);
}
.deco-text {
  font-size:9px; letter-spacing:.45em; font-weight:300;
  color:rgba(255,225,230,0.95);
  /* 白グロウで視認性確保 */
  text-shadow:
    0 0 8px rgba(255,255,255,.9),
    0 0 18px rgba(255,255,255,.6),
    0 1px 4px rgba(0,0,0,.3);
}

/* ── 桜の季節バッジ（控えめ）── */
.season-badge {
  display:inline-flex; align-items:center; gap:7px;
  padding:4px 16px;
  border:1px solid rgba(255,200,215,0.35);
  border-radius:20px; font-size:9px; letter-spacing:.3em;
  color:rgba(255,210,220,0.7);
  margin-bottom:14px;
  opacity:0; animation:fadeUp 1s ease .7s forwards;
  background:rgba(0,0,0,0.18);
  backdrop-filter:blur(6px);
}
.season-dot {
  width:4px; height:4px;
  background:rgba(255,190,210,0.6); border-radius:50%;
  animation:pulse 2.5s ease infinite;
}
@keyframes pulse {
  0%,100%{ opacity:1; transform:scale(1); }
  50%    { opacity:.4; transform:scale(.7); }
}

/* ── メインタイトル ── */
.title-wrap {
  text-align:center; margin-bottom:4px;
  opacity:0;
  animation:titleReveal 1.8s cubic-bezier(.16,1,.3,1) .9s forwards;
}
@keyframes titleReveal {
  from{ opacity:0; transform:translateY(32px) scale(.95); filter:blur(10px); }
  to  { opacity:1; transform:translateY(0)    scale(1);   filter:blur(0); }
}

.title-main {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(4.2rem,14vw,9.5rem);
  font-weight:400;
  letter-spacing:.09em; line-height:1;
  color:transparent;
  background:linear-gradient(
    135deg,
    #f0a0b8 0%, #f8d5a0 22%, #f0a0b8 42%,
    #e8d090 58%, #f0a8bc 78%, #fce8c0 100%
  );
  background-size:200% 200%;
  -webkit-background-clip:text; background-clip:text;
  animation:shimmer 7s ease infinite;
  display:inline-block;
  /* 白ハロー＋深みのある影 */
  filter:
    drop-shadow(0 0 16px rgba(255,255,255,1))
    drop-shadow(0 0 32px rgba(255,255,255,.9))
    drop-shadow(0 0 50px rgba(255,220,230,.7))
    drop-shadow(0 2px 0 rgba(255,255,255,1))
    drop-shadow(0 4px 4px rgba(80,20,30,.45))
    drop-shadow(0 12px 28px rgba(80,20,30,.3));
}
@keyframes shimmer {
  0%  { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100%{ background-position:0% 50%; }
}

/* ── サブタイトル（ほのぼの〜）── */
.title-jp {
  font-family:'Noto Serif JP', serif;
  font-size:clamp(.58rem,1.3vw,.72rem);
  letter-spacing:.55em; font-weight:300;
  color:rgba(255,245,248,0.95);
  margin-top:10px; display:inline-block;
  opacity:0; animation:fadeIn 1s ease 1.9s forwards;
  text-shadow:
    0 0 6px var(--glow-white),
    0 0 14px var(--glow-white),
    0 0 26px rgba(255,255,255,.85),
    0 0 40px rgba(255,230,235,.6),
    0 1px 0 rgba(255,255,255,1),
    0 2px 8px rgba(0,0,0,.35),
    0 4px 16px rgba(0,0,0,.2);
}

/* ── ゴールドデバイダー ── */
.gold-divider {
  display:flex; align-items:center; gap:12px;
  margin:14px 0;
  opacity:0; animation:fadeIn 1s ease 1.7s forwards;
}
.gold-line {
  width:70px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(220,185,110,.8));
}
.gold-line.right {
  background:linear-gradient(90deg, rgba(220,185,110,.8), transparent);
}
.gold-ornament{ display:flex; align-items:center; gap:5px; }
.gold-diamond {
  width:5px; height:5px;
  background:rgba(210,175,100,.9); transform:rotate(45deg);
}
.gold-diamond.small {
  width:3px; height:3px;
  background:rgba(235,215,155,.8);
}

/* ── キャッチコピー ── */
.catchcopy {
  text-align:center; margin-bottom:18px;
  opacity:0; animation:fadeUp 1s ease 2.1s forwards;
}
.catchcopy p {
  font-size:clamp(.7rem,1.6vw,.84rem);
  color:rgba(255,245,248,0.97);
  letter-spacing:.22em; font-weight:300; line-height:2;
  text-shadow:
    0 0 6px var(--glow-white),
    0 0 14px var(--glow-white),
    0 0 26px rgba(255,255,255,.8),
    0 0 40px rgba(255,230,235,.55),
    0 1px 0 rgba(255,255,255,.95),
    0 2px 8px rgba(0,0,0,.4),
    0 4px 18px rgba(0,0,0,.22);
}
.catchcopy .en {
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(.76rem,1.8vw,.92rem);
  color:rgba(255,220,200,0.95);
  letter-spacing:.12em; display:block; margin-top:2px;
  text-shadow:
    0 0 8px var(--glow-white),
    0 0 20px rgba(255,255,255,.85),
    0 1px 0 rgba(255,255,255,.95),
    0 2px 10px rgba(0,0,0,.35),
    0 4px 18px rgba(0,0,0,.18);
}

/* ── 桜ボタン ── */
.recommended-btn-wrap {
  opacity:0; animation:fadeUp 1s ease 2.5s forwards;
  margin-bottom:18px; position:relative;
}

.recommended-btn {
  display:inline-flex; align-items:center; gap:0;
  padding:0; border:none; border-radius:0;
  background:none; cursor:none;
  text-decoration:none; position:relative;
}

/* 花びら形のSVG背景ボタン */
.btn-inner {
  display:inline-flex; align-items:center; justify-content:center;
  gap:10px;
  padding:14px 44px;
  position:relative;
  color:var(--brown-dark);
  font-family:'Noto Serif JP', serif;
  font-size:11.5px; font-weight:400;
  letter-spacing:.28em;
  transition:all .4s ease;
  /* 和紙テクスチャ風の背景 */
  background:
    linear-gradient(135deg,
      rgba(255,245,235,.96) 0%,
      rgba(255,235,225,.94) 40%,
      rgba(255,245,238,.96) 100%
    );
  border-radius:50px;
  box-shadow:
    0 0 0 1px rgba(180,120,70,.5),
    0 0 0 3px rgba(255,210,190,.35),
    0 0 0 5px rgba(200,150,100,.15),
    0 6px 24px rgba(100,40,10,.28),
    0 2px 8px rgba(100,40,10,.2),
    0 0 30px rgba(255,180,160,.12);
}

/* 桜の花びらを左右に装飾 */
.btn-inner::before,
.btn-inner::after {
  content:'✿';
  font-size:14px;
  color:rgba(196,96,122,.7);
  position:absolute;
  transition:all .5s ease;
}
.btn-inner::before { left:16px; }
.btn-inner::after  { right:16px; }

.recommended-btn:hover .btn-inner {
  background:
    linear-gradient(135deg,
      rgba(255,240,235,.99) 0%,
      rgba(255,225,215,.97) 40%,
      rgba(255,240,232,.99) 100%
    );
  box-shadow:
    0 0 0 1px rgba(196,96,122,.65),
    0 0 0 3px rgba(255,180,180,.3),
    0 0 0 6px rgba(196,96,122,.1),
    0 10px 32px rgba(100,40,10,.32),
    0 4px 12px rgba(100,40,10,.22),
    0 0 40px rgba(255,160,160,.18);
  transform:translateY(-3px);
  color:var(--brown);
}
.recommended-btn:hover .btn-inner::before {
  transform:rotate(-20deg) scale(1.2);
  color:rgba(196,96,122,.9);
}
.recommended-btn:hover .btn-inner::after {
  transform:rotate(20deg) scale(1.2);
  color:rgba(196,96,122,.9);
}

.btn-label {
  position:relative; z-index:1;
  padding:0 4px;
}
.btn-sub {
  display:block;
  font-size:8px; letter-spacing:.4em;
  color:rgba(120,70,30,.6); margin-top:2px;
  text-align:center;
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
}

/* ── SNS ── */
.sns-wrap {
  display:flex; gap:12px;
  opacity:0; animation:fadeUp 1s ease 2.8s forwards;
}
.sns-link {
  display:flex; align-items:center; justify-content:center;
  width:40px; height:40px;
  border-radius:50%; text-decoration:none;
  transition:all .35s ease;
  position:relative;
  /* 暗背景＋くっきりアイコン */
  background:rgba(255,255,255,0.88);
  border:1.5px solid rgba(196,96,122,.5);
  box-shadow:
    0 3px 12px rgba(0,0,0,.25),
    0 1px 4px rgba(0,0,0,.15),
    0 0 0 1px rgba(255,255,255,.3) inset;
}
.sns-link svg {
  width:16px; height:16px;
  fill:var(--sakura-deep);
  transition:fill .3s ease;
}
.sns-link:hover {
  background:rgba(255,255,255,0.97);
  border-color:var(--sakura-deep);
  transform:translateY(-3px) scale(1.08);
  box-shadow:
    0 8px 20px rgba(196,96,122,.35),
    0 3px 8px rgba(0,0,0,.2);
}
.sns-link:hover svg { fill:#a03050; }

/* SNSラベル（スクリーンリーダー用） */
.sns-label {
  position:absolute; width:1px; height:1px;
  overflow:hidden; clip:rect(0,0,0,0);
}

/* ── キーフレーム ── */
@keyframes fadeIn {
  from{ opacity:0; } to{ opacity:1; }
}
@keyframes fadeUp {
  from{ opacity:0; transform:translateY(18px); }
  to  { opacity:1; transform:translateY(0); }
}

/* ── レスポンシブ ── */
@media (max-width:600px) {
  .v-text { display:none; }
  .deco-top { margin-bottom:12px; }
  .season-badge { margin-bottom:10px; }
  .title-main { font-size:clamp(3.8rem,19vw,6rem); }
  .gold-divider { margin:10px 0; }
  .catchcopy { margin-bottom:14px; }
  .btn-inner { padding:12px 36px; font-size:10.5px; }
  .sns-wrap { gap:10px; }
  .sns-link { width:36px; height:36px; }
  .sns-link svg { width:14px; height:14px; }
}
</style>
</head>

<script>
/* ── カスタムカーソル ── */
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px'; cursor.style.top=my+'px';
});
(function animRing(){
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
})();

/* ── 桜の花びら ── */
const canvas = document.getElementById('sakura-canvas');
const ctx    = canvas.getContext('2d');
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resize();
window.addEventListener('resize', resize);

class Petal {
  constructor(){ this.reset(true); }
  reset(init){
    this.x  = Math.random()*canvas.width;
    this.y  = init ? Math.random()*canvas.height : -20;
    this.size      = Math.random()*7+4;
    this.speedY    = Math.random()*.4+.15;
    this.speedX    = Math.random()*.3-.15;
    this.angle     = Math.random()*Math.PI*2;
    this.angleSpeed= (Math.random()-.5)*.008;
    this.swing     = Math.random()*2+.5;
    this.swingSpeed= Math.random()*.012+.003;
    this.swingOff  = Math.random()*Math.PI*2;
    this.opacity   = Math.random()*.45+.25;
    this.opacitySpd= (Math.random()-.5)*.002;
    const cols=[[255,182,193],[255,160,180],[240,128,152],[255,210,220],[252,196,208],[248,174,192]];
    this.color=cols[Math.floor(Math.random()*cols.length)];
  }
  update(){
    this.swingOff+=this.swingSpeed;
    this.x+=this.speedX+Math.sin(this.swingOff)*this.swing*.05;
    this.y+=this.speedY;
    this.angle+=this.angleSpeed;
    this.opacity+=this.opacitySpd;
    if(this.opacity>.85)this.opacitySpd*=-1;
    if(this.opacity<.1) this.opacitySpd*=-1;
    if(this.y>canvas.height+20||this.x<-20||this.x>canvas.width+20) this.reset(false);
  }
  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha=this.opacity;
    const [r,g,b]=this.color, s=this.size;
    ctx.beginPath();
    ctx.moveTo(0,-s);
    ctx.bezierCurveTo(s*.8,-s*.8,s*.8,s*.3,0,s*.5);
    ctx.bezierCurveTo(-s*.8,s*.3,-s*.8,-s*.8,0,-s);
    ctx.closePath();
    const gr=ctx.createRadialGradient(0,-s*.2,0,0,0,s);
    gr.addColorStop(0,`rgba(255,240,245,${this.opacity})`);
    gr.addColorStop(.5,`rgba(${r},${g},${b},${this.opacity})`);
    gr.addColorStop(1,`rgba(${Math.max(r-30,0)},${Math.max(g-30,0)},${Math.max(b-20,0)},${this.opacity*.8})`);
    ctx.fillStyle=gr; ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s*.4);
    ctx.strokeStyle=`rgba(${Math.max(r-40,0)},${Math.max(g-40,0)},${Math.max(b-30,0)},${this.opacity*.3})`;
    ctx.lineWidth=.5; ctx.stroke();
    ctx.restore();
  }
}
const petals=Array.from({length:28},()=>new Petal());
(function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  petals.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animate);
})();

/* ── タイトルホバー3D ── */
const title=document.querySelector('.title-main');
title.addEventListener('mousemove',e=>{
  const r=title.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width-.5;
  const y=(e.clientY-r.top)/r.height-.5;
  title.style.transform=`perspective(600px) rotateY(${x*8}deg) rotateX(${-y*4}deg) scale(1.02)`;
  title.style.transition='transform .1s ease';
});
title.addEventListener('mouseleave',()=>{
  title.style.transform='perspective(600px) rotateY(0) rotateX(0) scale(1)';
  title.style.transition='transform .5s ease';
});
</script>
</body>
