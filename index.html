<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honobono</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --sakura-deep: #c4607a;
  --sakura-mid:  #e8a0b4;
  --gold:        #c9a96e;
  --gold-light:  #e8d5b0;
  --brown:       #6a3a18;
  --brown-dark:  #3e1f08;
}

html, body { width:100%; height:100%; overflow:hidden; }
body { font-family:'Noto Serif JP', serif; cursor:none; }

/* ── カスタムカーソル ── */
.cursor {
  position:fixed; width:8px; height:8px;
  background:var(--sakura-deep); border-radius:50%;
  pointer-events:none; z-index:200;
  transform:translate(-50%,-50%);
}
.cursor-ring {
  position:fixed; width:34px; height:34px;
  border:1px solid rgba(232,160,180,0.6); border-radius:50%;
  pointer-events:none; z-index:200;
  transform:translate(-50%,-50%);
  transition:all .15s ease;
}

/* ── 背景画像 ── */
.bg-image {
  position:fixed; inset:0; z-index:0;
  background-image:url('images/GitHub-sakura/sakura-main.png');
  background-size:cover; background-position:center;
}

/* ── オーバーレイ：写真を活かす最小限 ── */
.bg-overlay {
  position:fixed; inset:0; z-index:1;
  background:
    linear-gradient(
      to bottom,
      rgba(10,4,8,0.22) 0%,
      rgba(10,4,8,0.04) 25%,
      rgba(10,4,8,0.02) 52%,
      rgba(10,4,8,0.18) 80%,
      rgba(10,4,8,0.35) 100%
    );
}

/* ── 花びら canvas ── */
#sakura-canvas {
  position:fixed; inset:0; width:100%; height:100%;
  pointer-events:none; z-index:2;
}

/* ── 縦書き装飾 ── */
.v-text {
  position:fixed; writing-mode:vertical-rl;
  font-size:9px; letter-spacing:.45em;
  font-family:'Noto Serif JP', serif; font-weight:200;
  z-index:10;
  color:rgba(255,235,240,0.5);
  text-shadow:0 0 8px rgba(255,255,255,.35), 0 1px 4px rgba(0,0,0,.2);
}
.v-text.left  { left:18px;  top:50%; transform:translateY(-50%); }
.v-text.right { right:18px; top:50%; transform:translateY(-50%); }

/* ── メインコンテナ ── */
.container {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px 24px;
}

/* ── SPRING 2026 ── */
.deco-top {
  display:flex; align-items:center; gap:14px;
  margin-bottom:16px;
  opacity:0; animation:fadeIn 1.5s ease .4s forwards;
}
.deco-line {
  width:52px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,215,225,0.8));
}
.deco-line.right {
  background:linear-gradient(90deg, rgba(255,215,225,0.8), transparent);
}
.deco-diamond {
  width:5px; height:5px;
  background:rgba(255,210,220,0.85); transform:rotate(45deg);
}
.deco-text {
  font-size:9px; letter-spacing:.45em; font-weight:300;
  color:rgba(255,235,240,1);
  text-shadow:
    0 0 6px rgba(255,255,255,.95),
    0 0 14px rgba(255,255,255,.7),
    0 1px 0 rgba(255,255,255,.9),
    0 2px 8px rgba(0,0,0,.55),
    0 4px 16px rgba(0,0,0,.3);
}

/* ── 桜の季節バッジ（控えめ）── */
.season-badge {
  display:inline-flex; align-items:center; gap:7px;
  padding:3px 14px;
  border:1px solid rgba(255,200,215,0.3);
  border-radius:20px; font-size:8.5px; letter-spacing:.3em;
  color:rgba(255,210,220,0.6);
  margin-bottom:12px;
  opacity:0; animation:fadeUp 1s ease .7s forwards;
  background:rgba(0,0,0,0.14); backdrop-filter:blur(6px);
}
.season-dot {
  width:3px; height:3px;
  background:rgba(255,185,205,0.55); border-radius:50%;
  animation:pulse 2.5s ease infinite;
}
@keyframes pulse {
  0%,100%{ opacity:1; transform:scale(1); }
  50%    { opacity:.35; transform:scale(.65); }
}

/* ── メインタイトル ── */
.title-wrap {
  text-align:center; margin-bottom:4px;
  opacity:0;
  animation:titleReveal 1.8s cubic-bezier(.16,1,.3,1) .9s forwards;
}
@keyframes titleReveal {
  from{ opacity:0; transform:translateY(28px) scale(.96); filter:blur(8px); }
  to  { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

.title-main {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(4rem,13vw,8.5rem);
  font-weight:400;
  letter-spacing:.09em; line-height:1;
  color:transparent;
  /* グロウを控えめに → 背景写真が活きる */
  background:linear-gradient(
    135deg,
    #e8a0b8 0%, #f0c890 22%, #e8a0b8 42%,
    #e0c07a 58%, #e8a8bc 78%, #f0d8a8 100%
  );
  background-size:200% 200%;
  -webkit-background-clip:text; background-clip:text;
  animation:shimmer 7s ease infinite;
  display:inline-block;
  /* ハローを抑えて自然な輝き */
  filter:
    drop-shadow(0 0 8px rgba(255,255,255,.7))
    drop-shadow(0 0 20px rgba(255,255,255,.5))
    drop-shadow(0 2px 2px rgba(60,15,20,.5))
    drop-shadow(0 6px 18px rgba(60,15,20,.35));
}
@keyframes shimmer {
  0%  { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100%{ background-position:0% 50%; }
}

/* ── サブタイトル（ほのぼの〜）── */
.title-jp {
  font-family:'Noto Serif JP', serif;
  font-size:clamp(.57rem,1.25vw,.7rem);
  letter-spacing:.52em; font-weight:300;
  color:rgba(255,242,246,0.95);
  margin-top:10px; display:inline-block;
  opacity:0; animation:fadeIn 1s ease 1.9s forwards;
  text-shadow:
    0 0 5px rgba(255,255,255,.9),
    0 0 12px rgba(255,255,255,.7),
    0 0 22px rgba(255,255,255,.5),
    0 1px 0 rgba(255,255,255,.9),
    0 2px 6px rgba(0,0,0,.5),
    0 4px 14px rgba(0,0,0,.28);
}

/* ── ゴールドデバイダー ── */
.gold-divider {
  display:flex; align-items:center; gap:12px;
  margin:13px 0;
  opacity:0; animation:fadeIn 1s ease 1.7s forwards;
}
.gold-line {
  width:65px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(215,180,105,.75));
}
.gold-line.right {
  background:linear-gradient(90deg, rgba(215,180,105,.75), transparent);
}
.gold-ornament{ display:flex; align-items:center; gap:5px; }
.gold-diamond {
  width:5px; height:5px;
  background:rgba(205,170,95,.85); transform:rotate(45deg);
}
.gold-diamond.small {
  width:3px; height:3px; background:rgba(230,210,145,.75);
}

/* ── キャッチコピー ── */
.catchcopy {
  text-align:center; margin-bottom:16px;
  opacity:0; animation:fadeUp 1s ease 2.1s forwards;
}
.catchcopy p {
  font-size:clamp(.69rem,1.55vw,.82rem);
  color:rgba(255,242,246,0.97);
  letter-spacing:.22em; font-weight:300; line-height:1.95;
  text-shadow:
    0 0 5px rgba(255,255,255,.85),
    0 0 12px rgba(255,255,255,.6),
    0 0 22px rgba(255,255,255,.4),
    0 1px 0 rgba(255,255,255,.85),
    0 2px 7px rgba(0,0,0,.55),
    0 4px 16px rgba(0,0,0,.28);
}
/* 英語部分：コントラスト強化 */
.catchcopy .en {
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(.78rem,1.85vw,.96rem);
  font-weight:300;
  /* より明るく・影を強めにして背景から切り離す */
  color:rgba(255,235,215,1);
  letter-spacing:.13em; display:block; margin-top:3px;
  text-shadow:
    0 0 6px rgba(255,255,255,1),
    0 0 14px rgba(255,255,255,.9),
    0 0 26px rgba(255,255,255,.65),
    0 0 40px rgba(255,220,180,.4),
    0 1px 0 rgba(255,255,255,1),
    0 2px 8px rgba(0,0,0,.65),
    0 5px 20px rgba(0,0,0,.38);
}

/* ── 3D 桜ボタン ── */
.recommended-btn-wrap {
  opacity:0; animation:fadeUp 1s ease 2.45s forwards;
  margin-bottom:16px;
}

.recommended-btn {
  display:inline-block; text-decoration:none;
  position:relative;
}

/* ボタン本体（上面）*/
.btn-face {
  display:inline-flex; align-items:center; justify-content:center;
  gap:10px;
  padding:13px 42px;
  position:relative; z-index:1;
  border-radius:6px;
  color:var(--brown-dark);
  font-family:'Noto Serif JP', serif;
  font-size:11.5px; font-weight:400;
  letter-spacing:.26em;
  background:linear-gradient(
    170deg,
    rgba(255,248,238,1) 0%,
    rgba(255,235,218,1) 55%,
    rgba(248,224,205,1) 100%
  );
  border:1px solid rgba(180,120,70,.4);
  /* 上面の光沢ライン */
  box-shadow:
    0 1px 0 rgba(255,255,255,.95) inset,
    0 -1px 0 rgba(160,100,50,.2) inset;
  transition:all .12s ease;
}

/* 3D 側面（擬似要素で奥行き）*/
.btn-face::after {
  content:'';
  position:absolute;
  inset:0; border-radius:6px;
  background:transparent;
  box-shadow:
    /* 多層シャドウで立体感 */
    0 4px 0 rgba(140,85,30,.7),
    0 5px 0 rgba(120,68,20,.5),
    0 6px 0 rgba(100,55,15,.35),
    0 7px 0 rgba(80,42,10,.2),
    0 9px 18px rgba(60,20,5,.45),
    0 14px 30px rgba(60,20,5,.22);
  transition:box-shadow .12s ease, transform .12s ease;
  z-index:-1;
}

/* 左右の桜装飾 */
.btn-petal-l, .btn-petal-r {
  font-size:15px; line-height:1;
  color:rgba(196,96,122,.65);
  transition:all .35s ease;
}

/* ホバー：押し込み演出 */
.recommended-btn:hover .btn-face {
  transform:translateY(3px);
  background:linear-gradient(
    170deg,
    rgba(255,245,232,1) 0%,
    rgba(255,228,208,1) 55%,
    rgba(245,218,198,1) 100%
  );
}
.recommended-btn:hover .btn-face::after {
  box-shadow:
    0 1px 0 rgba(140,85,30,.7),
    0 2px 0 rgba(120,68,20,.5),
    0 3px 0 rgba(100,55,15,.3),
    0 5px 12px rgba(60,20,5,.4),
    0 8px 22px rgba(60,20,5,.18);
}
.recommended-btn:hover .btn-petal-l {
  transform:rotate(-22deg) scale(1.25);
  color:rgba(196,96,122,.9);
}
.recommended-btn:hover .btn-petal-r {
  transform:rotate(22deg) scale(1.25);
  color:rgba(196,96,122,.9);
}

.btn-label { position:relative; z-index:1; }
.btn-sub {
  display:block; font-size:8px; letter-spacing:.38em;
  color:rgba(110,58,20,.55); margin-top:3px;
  font-family:'Cormorant Garamond', serif; font-style:italic;
  text-align:center;
}

/* ── SNS ── */
.sns-wrap {
  display:flex; gap:11px;
  opacity:0; animation:fadeUp 1s ease 2.75s forwards;
}
.sns-link {
  display:flex; align-items:center; justify-content:center;
  width:38px; height:38px; border-radius:50%;
  text-decoration:none; transition:all .3s ease;
  background:rgba(255,255,255,0.92);
  border:1.5px solid rgba(196,96,122,.4);
  box-shadow:
    0 3px 10px rgba(0,0,0,.3),
    0 1px 3px rgba(0,0,0,.2),
    0 0 0 1px rgba(255,255,255,.35) inset;
}
.sns-link svg {
  width:15px; height:15px;
  fill:var(--sakura-deep); transition:fill .25s ease;
}
.sns-link:hover {
  background:rgba(255,255,255,1);
  border-color:var(--sakura-deep);
  transform:translateY(-3px) scale(1.1);
  box-shadow:0 8px 22px rgba(196,96,122,.38), 0 3px 8px rgba(0,0,0,.22);
}
.sns-link:hover svg { fill:#943050; }

/* ── キーフレーム ── */
@keyframes fadeIn {
  from{ opacity:0; } to{ opacity:1; }
}
@keyframes fadeUp {
  from{ opacity:0; transform:translateY(16px); }
  to  { opacity:1; transform:translateY(0); }
}

/* ── レスポンシブ ── */
@media (max-width:600px) {
  .v-text { display:none; }
  .deco-top { margin-bottom:10px; }
  .title-main { font-size:clamp(3.6rem,18vw,6rem); }
  .gold-divider { margin:9px 0; }
  .btn-face { padding:11px 30px; font-size:10.5px; letter-spacing:.18em; }
  .sns-wrap { gap:9px; }
  .sns-link { width:34px; height:34px; }
  .sns-link svg { width:13px; height:13px; }
}
</style>
</head>

<script>
/* ── カスタムカーソル ── */
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px'; cursor.style.top=my+'px';
});
(function animRing(){
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
})();

/* ── 花びら：エリア指定版 ── */
const canvas = document.getElementById('sakura-canvas');
const ctx    = canvas.getContext('2d');

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/*
 * 画像の構成（16:9横長）を想定したゾーン定義
 * 画面を割合で指定：
 *   ZONE A（青空）  : x 0〜55%, y 0〜38%   ← 空の明るいエリア
 *   ZONE B（幹付近）: x 55〜75%, y 20〜70%  ← 太い幹あたり
 *   ZONE C（タイトル上）: x 25〜75%, y 0〜18%  ← タイトルの頭上
 * 各ゾーンに常時3枚ずつ、合計9枚を管理
 */

const ZONES = [
  // 青空エリア（左寄り上部）
  { xMin:0.05, xMax:0.50, yMin:0.02, yMax:0.40, count:3 },
  // 幹付近（右寄り中段）
  { xMin:0.55, xMax:0.80, yMin:0.15, yMax:0.72, count:3 },
  // タイトル上（中央上部）
  { xMin:0.28, xMax:0.72, yMin:0.00, yMax:0.20, count:3 },
];

class ZonePetal {
  constructor(zone){
    this.zone = zone;
    this.spawn();
  }

  spawn(){
    const z  = this.zone;
    const W  = canvas.width;
    const H  = canvas.height;

    // ゾーン内にランダム配置
    this.x = W * (z.xMin + Math.random() * (z.xMax - z.xMin));
    // y はゾーン上端より少し上から降り始める
    this.y = H * (z.yMin - 0.06 + Math.random() * 0.06);

    this.size       = Math.random() * 6 + 5;        // やや大きめ
    this.speedY     = Math.random() * 0.35 + 0.18;
    this.speedX     = (Math.random() - 0.5) * 0.18;
    this.angle      = Math.random() * Math.PI * 2;
    this.angleSpeed = (Math.random() - 0.5) * 0.007;
    this.swing      = Math.random() * 1.8 + 0.6;
    this.swingSpeed = Math.random() * 0.010 + 0.003;
    this.swingOff   = Math.random() * Math.PI * 2;
    this.opacity    = Math.random() * 0.35 + 0.52;  // 見やすく濃いめ
    this.opacitySpd = (Math.random() - 0.5) * 0.0015;

    const cols = [
      [255,175,190],[255,155,175],[242,120,148],
      [255,205,215],[250,188,202],[246,168,188]
    ];
    this.color = cols[Math.floor(Math.random() * cols.length)];
  }

  update(){
    this.swingOff += this.swingSpeed;
    this.x += this.speedX + Math.sin(this.swingOff) * this.swing * 0.055;
    this.y += this.speedY;
    this.angle += this.angleSpeed;
    this.opacity += this.opacitySpd;
    if(this.opacity > 0.92) this.opacitySpd *= -1;
    if(this.opacity < 0.38) this.opacitySpd *= -1;

    // ゾーン下端を超えたら再スポーン
    const z = this.zone;
    if(this.y > canvas.height * (z.yMax + 0.06)){
      this.spawn();
    }
    // ゾーンの左右を大きく外れたら戻す
    if(this.x < canvas.width * (z.xMin - 0.08) ||
       this.x > canvas.width * (z.xMax + 0.08)){
      this.spawn();
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = this.opacity;

    const [r,g,b] = this.color;
    const s = this.size;

    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.bezierCurveTo( s*.8, -s*.8,  s*.8, s*.3, 0, s*.5);
    ctx.bezierCurveTo(-s*.8,  s*.3, -s*.8,-s*.8, 0,  -s);
    ctx.closePath();

    const gr = ctx.createRadialGradient(0,-s*.2,0, 0,0,s);
    gr.addColorStop(0, `rgba(255,245,248,${this.opacity})`);
    gr.addColorStop(.5,`rgba(${r},${g},${b},${this.opacity})`);
    gr.addColorStop(1, `rgba(${Math.max(r-28,0)},${Math.max(g-28,0)},${Math.max(b-18,0)},${this.opacity*.82})`);
    ctx.fillStyle = gr;
    ctx.fill();

    // 葉脈
    ctx.beginPath();
    ctx.moveTo(0,-s); ctx.lineTo(0,s*.42);
    ctx.strokeStyle = `rgba(${Math.max(r-45,0)},${Math.max(g-45,0)},${Math.max(b-32,0)},${this.opacity*.28})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.restore();
  }
}

// 各ゾーンに指定数の花びらを生成
const petals = [];
ZONES.forEach(zone => {
  for(let i = 0; i < zone.count; i++){
    const p = new ZonePetal(zone);
    // 初期位置をゾーン内に分散させる
    p.y = canvas.height * (zone.yMin + Math.random() * (zone.yMax - zone.yMin));
    petals.push(p);
  }
});

(function animate(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
})();

/* ── タイトルホバー3D ── */
const title = document.querySelector('.title-main');
title.addEventListener('mousemove', e => {
  const r = title.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width  - 0.5;
  const y = (e.clientY - r.top)  / r.height - 0.5;
  title.style.transform = `perspective(600px) rotateY(${x*7}deg) rotateX(${-y*3.5}deg) scale(1.018)`;
  title.style.transition = 'transform .1s ease';
});
title.addEventListener('mouseleave', () => {
  title.style.transform = 'perspective(600px) rotateY(0) rotateX(0) scale(1)';
  title.style.transition = 'transform .5s ease';
});
</script>
</body>
